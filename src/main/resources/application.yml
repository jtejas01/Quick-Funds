server :
  port : 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/quick_fund_core_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  hikari:
    minimum-idle: 5
    maximum-pool-size: 20
    idle-timeout: 30000
    max-lifetime: 1800000
    connection-timeout: 30000
    pool-name: QuickFund

  jpa :
    hibernate :
      ddl-auto: update
    show-sql : true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

logging :
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.description.sqlBasicBinder : TRACE

